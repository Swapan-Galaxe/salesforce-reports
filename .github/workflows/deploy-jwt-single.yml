name: Salesforce CI/CD JWT Single Org

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      
      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_SERVER_KEY }}" > server.key
          sf org login jwt --client-id ${{ secrets.SF_CONSUMER_KEY }} --jwt-key-file server.key --username ${{ secrets.SF_USERNAME }} --instance-url ${{ secrets.SF_INSTANCE_URL }} --alias cicd
          rm server.key
      
      - name: Validate Deployment
        run: sf project deploy start --source-dir force-app --target-org cicd --dry-run --test-level RunLocalTests

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      
      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_SERVER_KEY }}" > server.key
          sf org login jwt --client-id ${{ secrets.SF_CONSUMER_KEY }} --jwt-key-file server.key --username ${{ secrets.SF_USERNAME }} --instance-url ${{ secrets.SF_INSTANCE_URL }} --alias cicd
          rm server.key
      
      - name: Deploy to Salesforce
        run: sf project deploy start --source-dir force-app --target-org cicd --test-level RunLocalTests
